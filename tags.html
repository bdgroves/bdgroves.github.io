const tagMap = {};
POSTS.forEach(p => p.tags.forEach(t => { tagMap[t] = (tagMap[t]||0)+1; }));
const sortedTags = Object.entries(tagMap).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));

let activeTag = null;
if (window.location.hash) {
  activeTag = decodeURIComponent(window.location.hash.slice(1));
}

const tagCloud = document.getElementById('tagCloud');
sortedTags.forEach(([tag, count]) => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
  btn.innerHTML = tag + '<span class="tag-count">' + count + '</span>';
  btn.onclick = () => {
    if (activeTag === tag) {
      activeTag = null;
      window.location.hash = '';
    } else {
      activeTag = tag;
      window.location.hash = encodeURIComponent(tag);
    }
    renderPosts();
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    if (activeTag) btn.classList.add('active');
  };
  tagCloud.appendChild(btn);
});

function renderPosts() {
  const label = document.getElementById('resultsLabel');
  const list = document.getElementById('postList');
  const filtered = activeTag ? POSTS.filter(p => p.tags.includes(activeTag)) : POSTS;
  label.innerHTML = activeTag
    ? 'Showing <span>' + filtered.length + ' ' + (filtered.length !== 1 ? 'entries' : 'entry') + '</span> tagged <span>' + activeTag + '</span>'
    : 'All entries — <span>' + POSTS.length + ' total</span>';
  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No entries found for this tag.</div>';
    return;
  }
  list.innerHTML = filtered.map(p =>
    '<a href="' + p.url + '" class="post-item">' +
    '<div class="post-item-tags">' + p.tags.slice(0,4).join(' · ') + '</div>' +
    '<div class="post-item-title">' + p.title + '</div>' +
    '<div class="post-item-dek">' + p.dek + '</div>' +
    '<div class="post-item-date">' + p.date + '</div>' +
    '</a>'
  ).join('');
}

renderPosts();
</script>
