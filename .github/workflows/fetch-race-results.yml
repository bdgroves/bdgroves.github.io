name: Fetch Race Results

on:
  schedule:
    # Twice daily during active windows: once mid-afternoon UTC (after early-finishing stages)
    # and once late-evening UTC (after late-finishing stages + Wikipedia editors have had time)
    - cron: '0 17,22 * * *'
  workflow_dispatch:
    inputs:
      race:
        description: 'Which race to update (giro, tdf, or both)'
        required: false
        default: 'both'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine which races to update
        id: which
        run: |
          INPUT="${{ github.event.inputs.race }}"
          if [ -z "$INPUT" ]; then
            INPUT="both"
          fi
          echo "race=$INPUT" >> "$GITHUB_OUTPUT"
          echo "Will process: $INPUT"

      - name: Fetch race data from Wikipedia
        env:
          RACE_INPUT: ${{ steps.which.outputs.race }}
        run: |
          python3 << 'PYEOF'
          """
          Fetch stage winners + GC from Wikipedia for cycling Grand Tours.

          Wikipedia uses cycling-specific templates inside the Stage sections:

              {{cyclingresult start|title=Stage N Result<ref ...>}}
              {{cyclingresult|1|[[Rider Name]]|NAT|{{UCI team code|CODE|2026}}|TIME}}
              {{cyclingresult|2|...}}
              ...
              {{cyclingresult end}}

          And the same for "General classification after Stage N",
          "Points classification after Stage N", etc.

          Strategy:
          1. Fetch Stage-1-to-11 and Stage-12-to-21 articles
          2. For each ==Stage N== section, find the cyclingresult blocks within
          3. The block whose title starts with "Stage N Result" gives the winner
          4. Track the latest GC / points / mountains / young-rider tables across all stages
          5. Merge into existing JSON, preserving manual fields
          """
          import json
          import os
          import re
          import sys
          import time
          from datetime import date, datetime, timedelta, timezone

          import requests

          # Polite UA per Wikimedia bot etiquette
          USER_AGENT = (
              'BrooksGrovesSiteBot/1.0 '
              '(https://github.com/bdgroves/bdgroves.github.io; '
              'data sync for brooksgroves.com race pages)'
          )

          RACE_INPUT = os.environ.get('RACE_INPUT', 'both').lower()
          today = date.today()

          RACES = {
              'giro': {
                  'json_path': 'data/giro-2026.json',
                  'wiki_articles': [
                      "2026 Giro d'Italia, Stage 1 to Stage 11",
                      "2026 Giro d'Italia, Stage 12 to Stage 21",
                  ],
                  'window_start': date(2026, 5, 8),
                  'window_end':   date(2026, 5, 31),
              },
              'tdf': {
                  'json_path': 'data/tdf-2026.json',
                  'wiki_articles': [
                      "2026 Tour de France, Stage 1 to Stage 11",
                      "2026 Tour de France, Stage 12 to Stage 21",
                  ],
                  'window_start': date(2026, 7, 4),
                  'window_end':   date(2026, 7, 26),
              },
          }

          # UCI team code -> display name. Codes are stable across the season.
          # If a code isn't here, we fall back to the bare code (so we'll see it
          # in the output and can add it to the map next run).
          TEAM_CODE_MAP = {
              # Men's WorldTour 2026
              'TBV':     'Bahrain Victorious',
              'TVL men': 'Visma–Lease a Bike',
              'NCI':     'Netcompany INEOS',
              'DCT':     'Decathlon CMA CGM Team',
              'RBH':     'Red Bull–Bora–Hansgrohe',
              'JAY men': 'Team Jayco AlUla',
              'TUD':     'Tudor Pro Cycling Team',
              'LTK men': 'Lidl–Trek',
              'UEX':     'UAE–XRG',
              'SOQ':     'Soudal Quick-Step',
              'PQT':     'Pinarello Q36.5 Pro Cycling Team',
              'APT':     'Alpecin–Deceuninck',
              'MOV men': 'Movistar Team',
              'URR':     'Unibet Rose Rockets',
              'GFC':     'Groupama–FDJ',
              'XDS':     'XDS Astana Team',
              'EFE':     'EF Education–EasyPost',
              'COF':     'Cofidis',
              'IPT':     'Israel–Premier Tech',
              'ARK':     'Arkéa–B&B Hotels',
              'INW':     'Intermarché–Wanty',
              # ProTeams / wildcards that often appear in Giro/TDF
              'TPC':     'Team Polti VisitMalta',
              'VBK':     'Bingoal WB',
              'TBL':     'Tropicana–Loto–Caja Rural',
              'PCT':     'Picnic PostNL',
          }

          # ─────────────────────────────────────────────────────────────────
          # Wikipedia API
          # ─────────────────────────────────────────────────────────────────

          def fetch_wikipedia_article(title, retries=3):
              url = "https://en.wikipedia.org/w/api.php"
              params = {
                  'action': 'parse',
                  'page': title,
                  'format': 'json',
                  'prop': 'wikitext',
                  'redirects': 1,
              }
              headers = {'User-Agent': USER_AGENT}
              for attempt in range(retries):
                  try:
                      r = requests.get(url, params=params, headers=headers, timeout=30)
                      r.raise_for_status()
                      data = r.json()
                      if 'error' in data:
                          if data['error'].get('code') == 'missingtitle':
                              print(f"  [WP] article not yet created: {title}")
                              return None
                          raise RuntimeError(f"Wikipedia API error: {data['error']}")
                      return data['parse']['wikitext']['*']
                  except Exception as e:
                      print(f"  [WP] attempt {attempt+1}/{retries} failed for {title}: {e}")
                      if attempt < retries - 1:
                          time.sleep(5 * (attempt + 1))
              return None

          # ─────────────────────────────────────────────────────────────────
          # Template parsing (brace-depth aware)
          # ─────────────────────────────────────────────────────────────────

          def find_template_end(text, start_idx):
              """Given text[start_idx:start_idx+2]=='{{', return index just after matching '}}'.
              Handles nested {{ }}. Returns -1 if unbalanced."""
              if text[start_idx:start_idx+2] != '{{':
                  return -1
              depth = 0
              i = start_idx
              while i < len(text):
                  if text[i:i+2] == '{{':
                      depth += 1
                      i += 2
                  elif text[i:i+2] == '}}':
                      depth -= 1
                      i += 2
                      if depth == 0:
                          return i
                  else:
                      i += 1
              return -1

          def split_template_args(template_body):
              """Split template body on | respecting balanced [[ ]] and {{ }}."""
              args = []
              current = []
              depth_square = 0
              depth_curly = 0
              i = 0
              while i < len(template_body):
                  c2 = template_body[i:i+2]
                  if c2 == '[[':
                      depth_square += 1
                      current.append(c2); i += 2; continue
                  if c2 == ']]':
                      depth_square -= 1
                      current.append(c2); i += 2; continue
                  if c2 == '{{':
                      depth_curly += 1
                      current.append(c2); i += 2; continue
                  if c2 == '}}':
                      depth_curly -= 1
                      current.append(c2); i += 2; continue
                  c = template_body[i]
                  if c == '|' and depth_square == 0 and depth_curly == 0:
                      args.append(''.join(current))
                      current = []
                      i += 1; continue
                  current.append(c)
                  i += 1
              if current:
                  args.append(''.join(current))
              return args

          def clean_title(s):
              s = re.sub(r'<ref[^>]*?/>', '', s)
              s = re.sub(r'<ref[^>]*>.*?</ref>', '', s, flags=re.DOTALL)
              return s.strip()

          def clean_rider(s):
              s = s.strip()
              # Strip optional flag template prefix: {{flagicon|XX}} [[Rider]]
              s = re.sub(r'^\{\{flagicon\|[^}]+\}\}\s*', '', s)
              m = re.match(r'^\[\[([^\]|]+)\|([^\]]+)\]\]$', s)
              if m:
                  return m.group(2).strip()
              m = re.match(r'^\[\[([^\]]+)\]\]$', s)
              if m:
                  name = m.group(1)
                  name = re.sub(r'\s*\([^)]+\)\s*$', '', name)
                  return name.strip()
              return s

          def parse_team(s):
              """Parse {{UCI team code|XXX|2026}} -> 'XXX' (looked up in TEAM_CODE_MAP)."""
              s = s.strip()
              m = re.match(r'\{\{UCI team code\|([^|}]+)', s)
              if m:
                  code = m.group(1).strip()
                  return TEAM_CODE_MAP.get(code, code)
              # Sometimes raw [[Team]] link
              m = re.match(r'^\[\[([^\]|]+)(?:\|[^\]]+)?\]\]$', s)
              if m:
                  return m.group(1).strip()
              return s

          # ─────────────────────────────────────────────────────────────────
          # Result block extraction
          # ─────────────────────────────────────────────────────────────────

          def extract_result_blocks(wikitext):
              """Find all {{cyclingresult start|title=X}}...{{cyclingresult end}} blocks.
              Returns list of (title, [rows])."""
              blocks = []
              i = 0
              while i < len(wikitext):
                  idx = wikitext.find('{{cyclingresult start', i)
                  if idx < 0:
                      break
                  start_end = find_template_end(wikitext, idx)
                  if start_end < 0:
                      break
                  start_body = wikitext[idx+2:start_end-2]
                  m = re.match(r'cyclingresult start\s*\|\s*title=', start_body)
                  if not m:
                      i = start_end
                      continue
                  title = clean_title(start_body[m.end():])

                  end_idx = wikitext.find('{{cyclingresult end}}', start_end)
                  if end_idx < 0:
                      i = start_end
                      continue
                  body = wikitext[start_end:end_idx]

                  rows = []
                  j = 0
                  while j < len(body):
                      t_idx = body.find('{{cyclingresult|', j)
                      if t_idx < 0:
                          break
                      t_end = find_template_end(body, t_idx)
                      if t_end < 0:
                          break
                      template_body = body[t_idx+2:t_end-2]
                      parts = split_template_args(template_body)
                      if len(parts) >= 6:
                          try:
                              rank = int(parts[1].strip())
                              rider = clean_rider(parts[2])
                              nation = parts[3].strip()
                              team = parse_team(parts[4])
                              time_str = parts[5].strip()
                              # Strip jersey templates from time if present
                              time_str = re.sub(r'\{\{cjersey[^}]+\}\}', '', time_str).strip()
                              rows.append({
                                  'rank': rank, 'rider': rider, 'nation': nation,
                                  'team': team, 'time': time_str,
                              })
                          except ValueError:
                              pass
                      j = t_end
                  if rows:
                      blocks.append((title, rows))
                  i = end_idx + len('{{cyclingresult end}}')
              return blocks

          # ─────────────────────────────────────────────────────────────────
          # Race processing
          # ─────────────────────────────────────────────────────────────────

          def should_run(race_key):
              if RACE_INPUT != 'both' and RACE_INPUT != race_key:
                  return False, f"skipped (input requested: {RACE_INPUT})"
              cfg = RACES[race_key]
              if today < cfg['window_start'] - timedelta(days=1):
                  return False, f"outside window (race starts {cfg['window_start']})"
              if today > cfg['window_end'] + timedelta(days=2):
                  return False, f"outside window (race ended {cfg['window_end']})"
              return True, "active"

          def parse_race(race_key):
              cfg = RACES[race_key]
              all_wikitext = ''
              for title in cfg['wiki_articles']:
                  print(f"  [WP] fetching: {title}")
                  text = fetch_wikipedia_article(title)
                  if text:
                      all_wikitext += '\n\n' + text
                      time.sleep(2)
              if not all_wikitext:
                  return None

              blocks = extract_result_blocks(all_wikitext)
              print(f"  [parse] found {len(blocks)} result blocks")

              winners = {}        # stage_num -> {winner, winner_team}
              latest_gc = None
              latest_gc_stage = 0
              latest_points = None
              latest_kom = None
              latest_youth = None
              # Track which stage the latest jerseys came from
              latest_points_stage = 0
              latest_kom_stage = 0
              latest_youth_stage = 0

              for title, rows in blocks:
                  # Stage N Result
                  m = re.match(r'Stage\s+(\d+)\s+Result\b', title, re.IGNORECASE)
                  if m and rows:
                      n = int(m.group(1))
                      w = rows[0]
                      winners[n] = {
                          'winner':      w['rider'],
                          'winner_team': w['team'],
                      }
                      print(f"  [parse] Stage {n} winner: {w['rider']} ({w['team']})")
                      continue

                  # General classification after Stage N
                  m = re.match(r'General\s+classification\s+after\s+Stage\s+(\d+)\b',
                               title, re.IGNORECASE)
                  if m and rows:
                      n = int(m.group(1))
                      if n > latest_gc_stage:
                          latest_gc = rows
                          latest_gc_stage = n
                      continue

                  # Points classification after Stage N
                  m = re.match(r'Points\s+classification\s+after\s+Stage\s+(\d+)\b',
                               title, re.IGNORECASE)
                  if m and rows:
                      n = int(m.group(1))
                      if n > latest_points_stage:
                          latest_points = rows[0]
                          latest_points_stage = n
                      continue

                  # Mountains classification after Stage N
                  m = re.match(r'Mountains\s+classification\s+after\s+Stage\s+(\d+)\b',
                               title, re.IGNORECASE)
                  if m and rows:
                      n = int(m.group(1))
                      if n > latest_kom_stage:
                          latest_kom = rows[0]
                          latest_kom_stage = n
                      continue

                  # Young rider classification after Stage N
                  m = re.match(r'Young\s+rider\s+classification\s+after\s+Stage\s+(\d+)\b',
                               title, re.IGNORECASE)
                  if m and rows:
                      n = int(m.group(1))
                      if n > latest_youth_stage:
                          latest_youth = rows[0]
                          latest_youth_stage = n
                      continue

              print(f"  [parse] latest GC: after Stage {latest_gc_stage} "
                    f"({len(latest_gc) if latest_gc else 0} riders)")
              print(f"  [parse] latest points/KOM/youth stages: "
                    f"{latest_points_stage}/{latest_kom_stage}/{latest_youth_stage}")

              return {
                  'winners': winners,
                  'gc': latest_gc,
                  'latest_stage': latest_gc_stage,
                  'points_leader': latest_points['rider'] if latest_points else None,
                  'kom_leader':    latest_kom['rider']    if latest_kom    else None,
                  'young_rider':   latest_youth['rider']  if latest_youth  else None,
              }

          def update_json(race_key, parsed):
              cfg = RACES[race_key]
              json_path = cfg['json_path']

              if not os.path.exists(json_path):
                  print(f"  [{race_key}] ERROR: {json_path} doesn't exist")
                  return False

              with open(json_path, 'r', encoding='utf-8') as f:
                  doc = json.load(f)

              changes = 0
              for stage in doc.get('stages', []):
                  num = stage.get('num')
                  if num in parsed['winners']:
                      w = parsed['winners'][num]
                      if stage.get('winner') != w['winner']:
                          stage['winner'] = w['winner']
                          changes += 1
                      if stage.get('winner_team') != w['winner_team']:
                          stage['winner_team'] = w['winner_team']
                          changes += 1

              if parsed['gc']:
                  new_gc = []
                  for row in parsed['gc'][:10]:
                      gap = 'Leader' if row['rank'] == 1 else (row['time'] or '+0:00')
                      new_gc.append({
                          'name': row['rider'],
                          'team': row['team'],
                          'gap':  gap,
                      })
                  if doc.get('gc') != new_gc:
                      doc['gc'] = new_gc
                      changes += 1

              for key in ('points_leader', 'kom_leader', 'young_rider'):
                  v = parsed[key]
                  if v and doc.get(key) != v:
                      doc[key] = v
                      changes += 1

              # Only write file (and bump last_updated) if real data changed.
              # That way we don't make noise commits twice a day with just a timestamp bump.
              if changes > 0:
                  doc['last_updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
                  with open(json_path, 'w', encoding='utf-8') as f:
                      json.dump(doc, f, ensure_ascii=False, indent=2)

              print(f"  [{race_key}] {changes} field changes, "
                    f"latest GC after Stage {parsed['latest_stage']}")
              return changes > 0

          # ──────────────────────────────────────────────────────────
          # MAIN
          # ──────────────────────────────────────────────────────────
          any_run = False
          for race_key in RACES:
              go, reason = should_run(race_key)
              print(f"\n=== {race_key.upper()} === {reason}")
              if not go:
                  continue
              any_run = True
              parsed = parse_race(race_key)
              if parsed is None:
                  print(f"  [{race_key}] no data fetched")
                  continue
              update_json(race_key, parsed)

          if not any_run:
              print("\nNo races in active window. Workflow no-op.")
          PYEOF

      - name: Commit data
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data/giro-2026.json data/tdf-2026.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: race results $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" && \
            git push && exit 0
            echo "Push retry $i…"
            sleep 5
          done
          echo "Failed to push after 3 retries"
          exit 1
