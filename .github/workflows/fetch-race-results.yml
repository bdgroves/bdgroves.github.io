name: Fetch Race Results

on:
  schedule:
    # Twice daily during active windows: once mid-afternoon UTC (after early-finishing stages)
    # and once late-evening UTC (after late-finishing stages + Wikipedia editors have had time).
    - cron: '0 17,22 * * *'
  workflow_dispatch:
    inputs:
      race:
        description: 'Which race to update (giro, tdf, vuelta, or both)'
        required: false
        default: 'both'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Determine which races to update
        id: which
        run: |
          INPUT="${{ github.event.inputs.race }}"
          if [ -z "$INPUT" ]; then
            INPUT="both"
          fi
          echo "race=$INPUT" >> "$GITHUB_OUTPUT"
          echo "Will process: $INPUT"

      - name: Fetch race data from Wikipedia + sync cycling.json
        env:
          RACE_INPUT: ${{ steps.which.outputs.race }}
        run: |
          python3 << 'PYEOF'
          """
          Fetch stage winners + GC from Wikipedia for cycling Grand Tours,
          write data/{giro,tdf,vuelta}-2026.json, then sync the resulting
          live standings into cycling.json (which powers outside.html).

          Wikipedia cycling templates inside Stage sections:

              {{cyclingresult start|title=Stage N Result<ref ...>}}
              {{cyclingresult|1|[[Rider Name]]|NAT|{{UCI team code|CODE|2026}}|TIME}}
              {{cyclingresult|2|...}}
              ...
              {{cyclingresult end}}

          Same shape for "General classification after Stage N",
          "Points classification after Stage N", etc.

          Strategy:
            1. Fetch Stage-1-to-11 and Stage-12-to-21 articles
            2. For each ==Stage N== section, find the cyclingresult blocks
            3. The block whose title starts with "Stage N Result" gives the winner
            4. Track the latest GC / points / mountains / young-rider tables
            5. Merge into existing data/*.json, preserving manual fields
            6. Sync grand tour rows in cycling.json
          """
          import json
          import os
          import re
          import sys
          import time
          from datetime import date, datetime, timedelta, timezone

          import requests

          # Polite UA per Wikimedia bot etiquette
          USER_AGENT = (
              'BrooksGrovesSiteBot/1.0 '
              '(https://github.com/bdgroves/bdgroves.github.io; '
              'data sync for brooksgroves.com race pages)'
          )

          RACE_INPUT = os.environ.get('RACE_INPUT', 'both').lower()
          today = date.today()

          # ─────────────────────────────────────────────────────────────────
          # Race configuration
          # ─────────────────────────────────────────────────────────────────
          # cycling_name must match the entry in cycling.json exactly (for sync).
          # main_article is the primary Wikipedia article that carries the
          # live classification tables (updated by editors after each stage).
          RACES = {
              'giro': {
                  'json_path': 'data/giro-2026.json',
                  'cycling_name': "Giro d'Italia",
                  'main_article': "2026 Giro d'Italia",
                  'window_start': date(2026, 5, 8),
                  'window_end':   date(2026, 5, 31),
              },
              'tdf': {
                  'json_path': 'data/tdf-2026.json',
                  'cycling_name': "Tour de France",
                  'main_article': "2026 Tour de France",
                  'window_start': date(2026, 7, 4),
                  'window_end':   date(2026, 7, 26),
              },
              'vuelta': {
                  'json_path': 'data/vuelta-2026.json',
                  'cycling_name': "Vuelta a España",
                  'main_article': "2026 Vuelta a España",
                  'window_start': date(2026, 8, 22),
                  'window_end':   date(2026, 9, 13),
              },
          }

          # UCI team code -> display name. Codes are stable across the season.
          # If a code isn't here, we fall back to the bare code (so we'll see it
          # in the output and can add it to the map next run).
          TEAM_CODE_MAP = {
              # Men's WorldTour 2026
              'TBV':     'Bahrain Victorious',
              'TVL men': 'Visma–Lease a Bike',
              'NCI':     'Netcompany INEOS',
              'DCT':     'Decathlon CMA CGM Team',
              'RBH':     'Red Bull–Bora–Hansgrohe',
              'JAY men': 'Team Jayco AlUla',
              'TUD':     'Tudor Pro Cycling Team',
              'LTK men': 'Lidl–Trek',
              'UEX':     'UAE–XRG',
              'SOQ':     'Soudal Quick-Step',
              'PQT':     'Pinarello Q36.5 Pro Cycling Team',
              'APT':     'Alpecin–Deceuninck',
              'MOV men': 'Movistar Team',
              'URR':     'Unibet Rose Rockets',
              'GFC':     'Groupama–FDJ',
              'XDS':     'XDS Astana Team',
              'XAT':     'XDS Astana Team',
              'EFE':     'EF Education–EasyPost',
              'COF':     'Cofidis',
              'IPT':     'Israel–Premier Tech',
              'ARK':     'Arkéa–B&B Hotels',
              'INW':     'Intermarché–Wanty',
              # ProTeams / wildcards that often appear in Giro/TDF/Vuelta
              'TPC':     'Team Polti VisitMalta',
              'VBK':     'Bingoal WB',
              'TBL':     'Tropicana–Loto–Caja Rural',
              'PCT':     'Picnic PostNL',
              'UXM':     'Uno-X Mobility',
              'CJR':     'Caja Rural–Seguros RGA',
              'NSN':     'NSN Cycling Team',
              'TEN':     'TotalEnergies',
          }

          # ─────────────────────────────────────────────────────────────────
          # Wikipedia API
          # ─────────────────────────────────────────────────────────────────

          def fetch_wikipedia_html(title, retries=3):
              """Fetch a Wikipedia article as rendered HTML (prop=text).
              Returns HTML string or None on failure / missing page."""
              url = "https://en.wikipedia.org/w/api.php"
              params = {
                  'action': 'parse',
                  'page': title,
                  'format': 'json',
                  'prop': 'text',
                  'redirects': 1,
                  'formatversion': '2',
              }
              headers = {'User-Agent': USER_AGENT}
              for attempt in range(retries):
                  try:
                      r = requests.get(url, params=params, headers=headers, timeout=30)
                      r.raise_for_status()
                      data = r.json()
                      if 'error' in data:
                          if data['error'].get('code') == 'missingtitle':
                              print(f"  [WP] article not yet created: {title}")
                              return None
                          raise RuntimeError(f"Wikipedia API error: {data['error']}")
                      # formatversion=2 returns text as string; v1 as {'*': str}
                      text = data['parse']['text']
                      if isinstance(text, dict):
                          text = text.get('*', '')
                      return text
                  except Exception as e:
                      print(f"  [WP] attempt {attempt+1}/{retries} failed for {title}: {e}")
                      if attempt < retries - 1:
                          time.sleep(5 * (attempt + 1))
              return None

          # ─────────────────────────────────────────────────────────────────
          # HTML table parsing (wikitables)
          # ─────────────────────────────────────────────────────────────────

          def clean_text(s):
              """Collapse whitespace and strip citation markers like [27]."""
              if not s:
                  return ""
              # Strip citation refs
              s = re.sub(r'\[\d+\]', '', s)
              # Collapse whitespace
              s = re.sub(r'\s+', ' ', s).strip()
              return s

          def cell_text_no_jerseys(cell):
              """Get cell text, skipping jersey/flag images that leave weird spacing."""
              # Remove <img> tags entirely (jersey icons show as image alt text otherwise)
              for img in cell.find_all('img'):
                  img.decompose()
              return clean_text(cell.get_text())

          def cell_primary_link_text(cell):
              """Return the first <a> link's text (usually the rider or team name).
              Falls back to full cell text if no link. Strips flags/jerseys first."""
              # Drop jersey/flag images so their alt text doesn't pollute
              for img in cell.find_all('img'):
                  img.decompose()
              a = cell.find('a')
              if a:
                  return clean_text(a.get_text())
              return clean_text(cell.get_text())

          def caption_text(table):
              cap = table.find('caption')
              if not cap:
                  return ""
              return clean_text(cap.get_text())

          def rows_of(table):
              """Return all <tr> rows in the table, excluding nested tables."""
              # Get direct tbody rows if present; else all tr under table
              tbody = table.find('tbody')
              if tbody:
                  return [tr for tr in tbody.find_all('tr', recursive=False)]
              return [tr for tr in table.find_all('tr', recursive=False)]

          def parse_rank(cell):
              """Extract integer rank from first cell of a classification row."""
              txt = clean_text(cell.get_text())
              m = re.match(r'^(\d+)', txt)
              return int(m.group(1)) if m else None

          # ─────────────────────────────────────────────────────────────────
          # Race processing
          # ─────────────────────────────────────────────────────────────────

          def should_run(race_key):
              if RACE_INPUT != 'both' and RACE_INPUT != race_key:
                  return False, f"skipped (input requested: {RACE_INPUT})"
              cfg = RACES[race_key]
              if today < cfg['window_start'] - timedelta(days=1):
                  return False, f"outside window (race starts {cfg['window_start']})"
              if today > cfg['window_end'] + timedelta(days=2):
                  return False, f"outside window (race ended {cfg['window_end']})"
              return True, "active"

          def parse_race(race_key):
              """Parse the main Wikipedia article for a Grand Tour by finding
              the classification wikitables and the stage characteristics table."""
              cfg = RACES[race_key]
              html = fetch_wikipedia_html(cfg['main_article'])
              if not html:
                  return None

              try:
                  from bs4 import BeautifulSoup
              except ImportError:
                  print("  [parse] bs4 not installed — aborting")
                  return None

              soup = BeautifulSoup(html, 'html.parser')
              tables = soup.find_all('table', class_='wikitable')
              print(f"  [parse] found {len(tables)} wikitables in article")

              winners = {}         # stage_num -> {winner, winner_team}
              latest_gc = None
              latest_gc_stage = 0
              points_leader = None
              kom_leader = None
              young_rider = None
              latest_points_stage = 0
              latest_kom_stage = 0
              latest_youth_stage = 0

              # Team lookup — populate from GC/points/etc rows so we can attach
              # a team to stage winners (which appear in a rider-only column).
              rider_team = {}

              # ── Pass 1: classification tables (GC / points / KOM / young rider) ──
              for table in tables:
                  cap = caption_text(table)
                  if not cap:
                      continue

                  # General classification after Stage N (1–10)
                  m = re.match(r'General classification after Stage (\d+)', cap, re.IGNORECASE)
                  if m:
                      n = int(m.group(1))
                      if n <= latest_gc_stage:
                          continue
                      gc_rows = []
                      for tr in rows_of(table):
                          cells = tr.find_all(['th', 'td'], recursive=False)
                          if len(cells) < 4:
                              continue
                          rank = parse_rank(cells[0])
                          if rank is None:
                              continue
                          rider = cell_primary_link_text(cells[1])
                          team  = cell_primary_link_text(cells[2])
                          time_str = clean_text(cells[3].get_text())
                          if rider:
                              gc_rows.append({
                                  'rank': rank, 'rider': rider,
                                  'nation': '', 'team': team, 'time': time_str,
                              })
                              if team:
                                  rider_team[rider] = team
                      if gc_rows:
                          latest_gc = gc_rows
                          latest_gc_stage = n
                          print(f"  [parse] GC after Stage {n}: {len(gc_rows)} rows, "
                                f"leader {gc_rows[0]['rider']} ({gc_rows[0]['team']})")
                      continue

                  # Points classification after Stage N
                  m = re.match(r'Points classification after Stage (\d+)', cap, re.IGNORECASE)
                  if m:
                      n = int(m.group(1))
                      if n > latest_points_stage:
                          for tr in rows_of(table):
                              cells = tr.find_all(['th', 'td'], recursive=False)
                              if len(cells) < 3:
                                  continue
                              rank = parse_rank(cells[0])
                              if rank != 1:
                                  continue
                              rider = cell_primary_link_text(cells[1])
                              team  = cell_primary_link_text(cells[2])
                              if rider:
                                  points_leader = {'rider': rider, 'team': team}
                                  latest_points_stage = n
                                  if team:
                                      rider_team[rider] = team
                              break
                      continue

                  # Mountains classification after Stage N
                  m = re.match(r'Mountains classification after Stage (\d+)', cap, re.IGNORECASE)
                  if m:
                      n = int(m.group(1))
                      if n > latest_kom_stage:
                          for tr in rows_of(table):
                              cells = tr.find_all(['th', 'td'], recursive=False)
                              if len(cells) < 3:
                                  continue
                              rank = parse_rank(cells[0])
                              if rank != 1:
                                  continue
                              rider = cell_primary_link_text(cells[1])
                              team  = cell_primary_link_text(cells[2])
                              if rider:
                                  kom_leader = {'rider': rider, 'team': team}
                                  latest_kom_stage = n
                                  if team:
                                      rider_team[rider] = team
                              break
                      continue

                  # Young rider classification after Stage N
                  m = re.match(r'Young rider classification after Stage (\d+)', cap, re.IGNORECASE)
                  if m:
                      n = int(m.group(1))
                      if n > latest_youth_stage:
                          for tr in rows_of(table):
                              cells = tr.find_all(['th', 'td'], recursive=False)
                              if len(cells) < 3:
                                  continue
                              rank = parse_rank(cells[0])
                              if rank != 1:
                                  continue
                              rider = cell_primary_link_text(cells[1])
                              team  = cell_primary_link_text(cells[2])
                              if rider:
                                  young_rider = {'rider': rider, 'team': team}
                                  latest_youth_stage = n
                                  if team:
                                      rider_team[rider] = team
                              break
                      continue

              # ── Pass 2: stage winners from Stage characteristics table ──
              # Table caption contains "Stage characteristics"; header row has
              # Stage / Date / Course / Distance / Type / Winner columns. The
              # Stage cell is a <th> starting with a stage number (may be blank
              # for rest days). Winner cell is the last <td> in the row.
              for table in tables:
                  cap = caption_text(table)
                  if not cap or 'Stage characteristics' not in cap:
                      continue
                  print(f"  [parse] found Stage characteristics table")
                  for tr in rows_of(table):
                      cells = tr.find_all(['th', 'td'], recursive=False)
                      if len(cells) < 6:
                          continue
                      # First cell is <th> with the stage number (linked)
                      stage_txt = clean_text(cells[0].get_text())
                      m = re.match(r'^(\d+)$', stage_txt)
                      if not m:
                          continue
                      stage_num = int(m.group(1))
                      # Winner is the last cell
                      winner_cell = cells[-1]
                      # Prefer the linked rider name if present
                      winner = cell_primary_link_text(winner_cell)
                      if not winner:
                          continue
                      # For TTT (Stage 1), the "winner" is the team name.
                      # Detect by whether the linked entity matches any team
                      # code we saw; otherwise treat as rider.
                      is_team = False
                      # Team names typically contain hyphen or specific words;
                      # easier: check if rider_team maps this to itself later.
                      winners[stage_num] = {
                          'winner': winner,
                          'winner_team': rider_team.get(winner, ''),
                      }
                  break  # only first Stage characteristics table

              # Fill missing stage winner teams from rider_team lookup
              for n, w in winners.items():
                  if not w['winner_team'] and w['winner'] in rider_team:
                      w['winner_team'] = rider_team[w['winner']]

              print(f"  [parse] {len(winners)} stage winners extracted")
              print(f"  [parse] latest GC: after Stage {latest_gc_stage} "
                    f"({len(latest_gc) if latest_gc else 0} riders)")
              print(f"  [parse] latest points/KOM/youth stages: "
                    f"{latest_points_stage}/{latest_kom_stage}/{latest_youth_stage}")

              # Diagnostic: if we got nothing, dump table captions so we can
              # see whether the article structure is unfamiliar.
              if not winners and not latest_gc:
                  print(f"  [DIAG] parse found nothing. Table captions:")
                  for t in tables:
                      c = caption_text(t)
                      if c:
                          print(f"  [DIAG]  - {c[:100]}")

              return {
                  'winners': winners,
                  'gc': latest_gc,
                  'latest_stage': latest_gc_stage,
                  'points_leader': points_leader['rider'] if points_leader else None,
                  'kom_leader':    kom_leader['rider']    if kom_leader    else None,
                  'young_rider':   young_rider['rider']  if young_rider   else None,
              }

          def update_json(race_key, parsed):
              cfg = RACES[race_key]
              json_path = cfg['json_path']

              if not os.path.exists(json_path):
                  print(f"  [{race_key}] ERROR: {json_path} doesn't exist")
                  return False

              with open(json_path, 'r', encoding='utf-8') as f:
                  doc = json.load(f)

              changes = 0
              for stage in doc.get('stages', []):
                  num = stage.get('num')
                  if num in parsed['winners']:
                      w = parsed['winners'][num]
                      if stage.get('winner') != w['winner']:
                          stage['winner'] = w['winner']
                          changes += 1
                      if stage.get('winner_team') != w['winner_team']:
                          stage['winner_team'] = w['winner_team']
                          changes += 1

              if parsed['gc']:
                  new_gc = []
                  for row in parsed['gc'][:10]:
                      gap = 'Leader' if row['rank'] == 1 else (row['time'] or '+0:00')
                      new_gc.append({
                          'name': row['rider'],
                          'team': row['team'],
                          'gap':  gap,
                      })
                  if doc.get('gc') != new_gc:
                      doc['gc'] = new_gc
                      changes += 1

              for key in ('points_leader', 'kom_leader', 'young_rider'):
                  v = parsed[key]
                  if v and doc.get(key) != v:
                      doc[key] = v
                      changes += 1

              # Only write file (and bump last_updated) if real data changed.
              # That way we don't make noise commits twice a day with just a timestamp bump.
              if changes > 0:
                  doc['last_updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
                  with open(json_path, 'w', encoding='utf-8') as f:
                      json.dump(doc, f, ensure_ascii=False, indent=2)

              print(f"  [{race_key}] {changes} field changes, "
                    f"latest GC after Stage {parsed['latest_stage']}")
              return changes > 0

          # ─────────────────────────────────────────────────────────────────
          # Sync grand-tour rows into cycling.json
          # ─────────────────────────────────────────────────────────────────

          def sync_cycling_json():
              """
              Read data/{giro,tdf,vuelta}-2026.json and update the matching grand
              tour entries in cycling.json (which powers outside.html):
                  gc_leader, gc_leader_team, live_gc, stages_done
              Also stamps cycling.json's 'updated' timestamp. Idempotent — only
              writes if something changed. Never overwrites good data with empty.
              """
              cycling_path = 'cycling.json'
              if not os.path.exists(cycling_path):
                  print("  [sync] cycling.json not found — skipping")
                  return False

              with open(cycling_path, 'r', encoding='utf-8') as f:
                  cy = json.load(f)

              changed = False
              for race_key, cfg in RACES.items():
                  data_path = cfg['json_path']
                  cy_name = cfg['cycling_name']
                  if not os.path.exists(data_path):
                      continue
                  try:
                      with open(data_path, 'r', encoding='utf-8') as f:
                          d = json.load(f)
                  except Exception as e:
                      print(f"  [sync] {race_key}: couldn't read {data_path}: {e}")
                      continue

                  # Find matching race row in cycling.json
                  target = None
                  for r in cy.get('races', []):
                      if r.get('name') == cy_name:
                          target = r
                          break
                  if target is None:
                      print(f"  [sync] {race_key}: no matching row for '{cy_name}' in cycling.json")
                      continue

                  # Count stages_done (stages with a winner recorded)
                  total_stages = len(d.get('stages', []))
                  stages_done = sum(
                      1 for s in d.get('stages', []) if s.get('winner')
                  )

                  gc = d.get('gc') or []
                  # Guard: don't wipe good data with empty
                  if gc:
                      leader = gc[0]
                      new_leader = leader.get('name', '') or ''
                      new_team   = leader.get('team', '') or ''
                      new_livegc = gc[:10]
                      if target.get('gc_leader') != new_leader:
                          target['gc_leader'] = new_leader
                          changed = True
                      if target.get('gc_leader_team') != new_team:
                          target['gc_leader_team'] = new_team
                          changed = True
                      if target.get('live_gc') != new_livegc:
                          target['live_gc'] = new_livegc
                          changed = True

                  if stages_done and target.get('stages_done') != stages_done:
                      target['stages_done'] = stages_done
                      changed = True

                  # Promote a completed race: all stages have winners AND today is
                  # past the race window → mark final, set winner/team from GC.
                  race_complete = (
                      total_stages > 0
                      and stages_done >= total_stages
                      and today > cfg['window_end']
                      and gc
                  )
                  if race_complete:
                      new_status = 'final'
                      new_winner = gc[0].get('name', '') or ''
                      new_wteam  = gc[0].get('team', '') or ''
                      if target.get('status') != new_status:
                          target['status'] = new_status
                          changed = True
                      if target.get('winner') != new_winner:
                          target['winner'] = new_winner
                          changed = True
                      if target.get('team') != new_wteam:
                          target['team'] = new_wteam
                          changed = True

                  print(f"  [sync] {race_key}: leader={target.get('gc_leader','?')}, "
                        f"stages_done={target.get('stages_done',0)}, "
                        f"status={target.get('status')}")

              if changed:
                  cy['updated'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
                  with open(cycling_path, 'w', encoding='utf-8') as f:
                      json.dump(cy, f, ensure_ascii=False, indent=2)
                  print("  [sync] cycling.json updated")
              else:
                  print("  [sync] cycling.json unchanged")
              return changed

          # ──────────────────────────────────────────────────────────
          # MAIN
          # ──────────────────────────────────────────────────────────
          any_run = False
          for race_key in RACES:
              go, reason = should_run(race_key)
              print(f"\n=== {race_key.upper()} === {reason}")
              if not go:
                  continue
              any_run = True
              parsed = parse_race(race_key)
              if parsed is None:
                  print(f"  [{race_key}] no data fetched")
                  continue
              update_json(race_key, parsed)

          if not any_run:
              print("\nNo races in active window. Skipping Wikipedia parse.")

          # Always sync cycling.json — even if we didn't fetch anything this
          # run, existing data/*.json values should stay reflected in cycling.json.
          print("\n=== SYNC cycling.json ===")
          sync_cycling_json()
          PYEOF

      - name: Commit data
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add data/giro-2026.json data/tdf-2026.json data/vuelta-2026.json cycling.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: race results $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" && \
            git push && exit 0
            echo "Push retry $i…"
            sleep 5
          done
          echo "Failed to push after 3 retries"
          exit 1
