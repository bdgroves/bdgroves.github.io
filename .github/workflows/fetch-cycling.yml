name: Fetch Cycling

on:
  schedule:
    - cron: '0 20 * * *'   # 8pm UTC daily — catches afternoon European race finishes
  workflow_dispatch:

jobs:
  fetch-cycling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install cloudscraper selectolax requests --break-system-packages

      - name: Fetch cycling data and write cycling.json
        run: |
          python3 << 'EOF'
          import json
          import traceback
          from datetime import datetime, timezone, date

          # ── RIDER SPOTLIGHT ──
          def get_rider_stats(pcs_slug, display_name, nationality_flag):
              try:
                  import cloudscraper
                  from selectolax.parser import HTMLParser
                  import re
                  print(f"  Fetching rider: {display_name}...")

                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/122.0.0.0", "Accept": "text/html,application/xhtml+xml"}

                  def fetch_url(url):
                      try:
                          import requests as req_lib
                          r = req_lib.get(url, headers=headers, timeout=15)
                          if r.status_code == 200 and len(r.text) > 1000:
                              return r
                      except Exception:
                          pass
                      sc = cloudscraper.create_scraper()
                      return sc.get(url, headers=headers, timeout=15)

                  results_url = f"https://www.procyclingstats.com/rider/{pcs_slug}/results/2026"
                  r2 = fetch_url(results_url)
                  tree2 = HTMLParser(r2.text)

                  results = []
                  table = tree2.css_first("table.rdrResults")
                  if table:
                      rows = table.css("tr")
                      print(f"    rdrResults rows: {len(rows)}")
                      for row in rows:
                          cols = row.css("td")
                          if len(cols) >= 3:
                              date_val = cols[0].text(strip=True)
                              result_val = cols[1].text(strip=True)
                              race_val = ""
                              for col in cols[2:]:
                                  a = col.css_first("a")
                                  if a:
                                      race_val = a.text(strip=True)
                                      race_val = re.sub(r'\s*\(.*?\)\s*', '', race_val).strip()
                                      break
                              if not race_val:
                                  race_val = cols[2].text(strip=True)
                                  race_val = re.sub(r'\s*\(.*?\)\s*', '', race_val).strip()
                              if race_val and len(race_val) > 2:
                                  results.append({"date": date_val, "result": result_val, "race": race_val})
                  else:
                      print(f"    No rdrResults table found")

                  wins_2026 = [r for r in results if str(r.get("result","")).strip() == "1"]

                  def clean_race_name(name):
                      import re
                      name = re.sub(r'^S\d+Stage \d+[-–]\s*', '', name)
                      name = re.sub(r'^General classification\s*', 'GC ', name)
                      name = re.sub(r'\s*ME$', '', name)
                      return name.strip()

                  for r in results:
                      r["race"] = clean_race_name(r["race"])
                  for w in wins_2026:
                      w["race"] = clean_race_name(w["race"])

                  print(f"    {len(results)} results, {len(wins_2026)} wins")
                  if wins_2026:
                      print(f"    Wins: {[w['race'] for w in wins_2026]}")

                  team = ""
                  pcs_ranking = None
                  pcs_points = None
                  try:
                      profile_url = f"https://www.procyclingstats.com/rider/{pcs_slug}"
                      rp = fetch_url(profile_url)
                      tp = HTMLParser(rp.text)

                      teams_ul = tp.css_first("ul[class*='rdr-teams']")
                      if teams_ul:
                          for a in teams_ul.css("a"):
                              txt = a.text(strip=True)
                              if txt and "(WT)" not in txt and len(txt) > 3:
                                  team = txt
                                  break
                          if not team:
                              full = teams_ul.text(strip=True)
                              m = re.search(r'\d{4}(.*?)\(WT\)', full)
                              if m:
                                  team = m.group(1).strip()

                      for ul in tp.css("ul.list.horizontal, ul[class='list horizontal']"):
                          txt = ul.text(strip=True)
                          m = re.search(r'PCS Ranking(\d+)', txt)
                          if m:
                              pcs_ranking = m.group(1)
                              break

                      basic = tp.css_first("table[class*='basic small'], table[class=' basic small']")
                      if basic:
                          for row in basic.css("tr"):
                              cols = row.css("td")
                              col_texts = [c.text(strip=True) for c in cols]
                              if col_texts and col_texts[0] == "2026":
                                  pcs_points = col_texts[1] if len(col_texts) > 1 else None
                                  break

                      print(f"    Team: {team or '?'}, Rank: #{pcs_ranking or '?'}, Pts: {pcs_points or '?'}")
                  except Exception as ep:
                      print(f"    Profile error: {ep}")

                  return {
                      "name": display_name,
                      "flag": nationality_flag,
                      "team": team,
                      "pcs_ranking": pcs_ranking,
                      "pcs_points": pcs_points,
                      "wins_2026": len(wins_2026),
                      "win_list": [{"race": w.get("race",""), "date": w.get("date","")} for w in wins_2026[:8]],
                      "recent_results": results[:6],
                      "fetched": True
                  }
              except Exception as e:
                  print(f"  ERROR fetching {display_name}: {e}")
                  traceback.print_exc()
                  return {"name": display_name, "flag": nationality_flag, "fetched": False, "error": str(e)}

          # ── FETCH LIVE RACE GC DATA ──
          def fetch_live_race(race_name, pcs_slug):
              """Scrape current GC standings from PCS for a live race."""
              try:
                  import cloudscraper
                  from selectolax.parser import HTMLParser
                  import re
                  scraper = cloudscraper.create_scraper()
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

                  # Get GC standings — try both /gc and /general-classification URLs
                  gc = []
                  for gc_url in [
                      f"https://www.procyclingstats.com/race/{pcs_slug}/2026/gc",
                      f"https://www.procyclingstats.com/race/{pcs_slug}/2026/general-classification",
                  ]:
                      print(f"    Fetching GC: {gc_url}")
                      r = scraper.get(gc_url, headers=headers, timeout=15)
                      if r.status_code != 200:
                          continue
                      tree = HTMLParser(r.text)
                      # Try all table selectors
                      for sel in ["table.rdrResults", "table.results", "div.result-cont table", "table"]:
                          table = tree.css_first(sel)
                          if not table:
                              continue
                          rows = table.css("tr")
                          print(f"    Selector {sel}: {len(rows)} rows")
                          for row in rows:
                              cols = row.css("td")
                              if len(cols) < 3:
                                  continue
                              rank = cols[0].text(strip=True).strip(".").strip()
                              if not rank.isdigit():
                                  continue
                              if int(rank) > 10:
                                  break
                              name = ""
                              team = ""
                              time = ""
                              for col in cols:
                                  a = col.css_first("a[href*='/rider/']")
                                  if a and not name:
                                      name = a.text(strip=True)
                                  a2 = col.css_first("a[href*='/team/']")
                                  if a2 and not team:
                                      team = a2.text(strip=True)
                              for col in reversed(cols):
                                  t = col.text(strip=True)
                                  if re.match(r"^[\d]+:[\d]+|^\+[\d]|^s\.t\.$|^0:00$", t):
                                      time = t
                                      break
                              if name:
                                  for key, (canonical, cteam) in KNOWN_WINNERS.items():
                                      if key.lower() in name.lower():
                                          name = canonical
                                          if not team:
                                              team = cteam
                                          break
                                  gc.append({"rank": int(rank), "name": name, "team": team, "time": time})
                          if gc:
                              break
                      if gc:
                          break

                  # Count completed stages by checking PCS stage results
                  stages_done = 0
                  try:
                      rr = scraper.get(f"https://www.procyclingstats.com/race/{pcs_slug}/2026", headers=headers, timeout=15)
                      tr = HTMLParser(rr.text)
                      # Count stage links that have results
                      done = set()
                      for a in tr.css("a[href*='stage-']"):
                          href = a.attributes.get("href", "")
                          m = re.search(r'stage-(\d+)', href)
                          if m:
                              done.add(m.group(1))
                      stages_done = len(done)
                  except Exception as se:
                      print(f"    Stage count error: {se}")

                  leader = gc[0] if gc else None
                  print(f"    GC: {leader['name'] if leader else 'none'}, {len(gc)} riders, {stages_done} stages done")
                  return {
                      "gc": gc[:5],
                      "leader": leader,
                      "stages_done": stages_done,
                  }
              except Exception as e:
                  print(f"    Live race fetch error: {e}")
                  return None

          # ── AUTO-FETCH RACE RESULTS FROM PCS ──
          PCS_RACE_SLUGS = {
              "Santos Tour Down Under": "tour-down-under",
              "Omloop Het Nieuwsblad": "omloop-het-nieuwsblad",
              "Strade Bianche": "strade-bianche",
              "Paris-Nice": "paris-nice",
              "Tirreno-Adriatico": "tirreno-adriatico",
              "Milan\u2013San Remo": "milano-sanremo",
              "Volta a Catalunya": "volta-a-catalunya",
              "E3 Saxo Classic": "e3-saxo-classic",
              "In Flanders Fields": "in-flanders-fields-uci",
              "Dwars door Vlaanderen": "dwars-door-vlaanderen",
              "Ronde van Vlaanderen": "ronde-van-vlaanderen",
              "Itzulia Basque Country": "itzulia-basque-country",
              "Paris\u2013Roubaix": "paris-roubaix",
              "Amstel Gold Race": "amstel-gold-race",
              "La Fl\u00e8che Wallonne": "la-fleche-wallonne",
              "Li\u00e8ge\u2013Bastogne\u2013Li\u00e8ge": "liege-bastogne-liege",
              "Tour de Romandie": "tour-de-romandie",
              "Eschborn-Frankfurt": "eschborn-frankfurt",
              "Giro d'Italia": "giro-d-italia",
              "Tour de Suisse": "tour-de-suisse",
              "Tour de France": "tour-de-france",
              "ADAC Cyclassics": "hamburg-cyclassics",
              "Vuelta a Espa\u00f1a": "vuelta-a-espana",
              "GP Qu\u00e9bec": "gp-quebec",
              "GP Montr\u00e9al": "gp-montreal",
              "Il Lombardia": "il-lombardia",
          }

          KNOWN_WINNERS = {
              "Tadej Poga\u010dar": ("Tadej Poga\u010dar \U0001f308", "UAE Team Emirates XRG"),
              "Tadej Pogacar": ("Tadej Poga\u010dar \U0001f308", "UAE Team Emirates XRG"),
              "Mathieu van der Poel": ("Mathieu van der Poel", "Alpecin-Premier Tech"),
              "Remco Evenepoel": ("Remco Evenepoel", "Red Bull - BORA - hansgrohe"),
              "Wout van Aert": ("Wout van Aert", "Visma-Lease a Bike"),
              "Jonas Vingegaard": ("Jonas Vingegaard", "Visma-Lease a Bike"),
              "Paul Seixas": ("Paul Seixas", "Decathlon CMA CGM"),
          }

          def fetch_race_result(race_name, race_date_str):
              """Fetch race winner from PCS. Returns (winner, team) or (None, None)."""
              slug = PCS_RACE_SLUGS.get(race_name)
              if not slug:
                  print(f"    No PCS slug for {race_name}")
                  return None, None
              try:
                  import cloudscraper
                  from selectolax.parser import HTMLParser
                  import re
                  scraper = cloudscraper.create_scraper()
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
                  url = f"https://www.procyclingstats.com/race/{slug}/2026/result"
                  print(f"    Fetching result: {url}")
                  r = scraper.get(url, headers=headers, timeout=15)
                  if r.status_code != 200:
                      print(f"    HTTP {r.status_code} for {race_name}")
                      return None, None
                  tree = HTMLParser(r.text)
                  # Try all table selectors PCS might use
                  table = None
                  for selector in ["table.results", "table.rdrResults", "div.result-cont table",
                                  "div.resultCont table", "table[class*='result']", "table"]:
                      table = tree.css_first(selector)
                      if table:
                          print(f"    Found table with selector: {selector}")
                          break
                  if not table:
                      # Last resort: look for rank "1" anywhere in the page text near a rider link
                      print(f"    No table found — trying text parse")
                      links = tree.css("a[href*='/rider/']")
                      for link in links[:5]:
                          parent = link.parent
                          if parent:
                              txt = parent.text(strip=True)
                              if txt.startswith("1") or "1 " in txt:
                                  rider_name = link.text(strip=True)
                                  if rider_name and len(rider_name) > 3:
                                      for key, (canonical, team) in KNOWN_WINNERS.items():
                                          if key.lower() in rider_name.lower():
                                              return canonical, team
                                      return rider_name, ""
                      print(f"    No results found for {race_name}")
                      return None, None
                  rows = table.css("tr")
                  print(f"    Table rows: {len(rows)}")
                  for row in rows:
                      cols = row.css("td")
                      if not cols:
                          continue
                      rank_text = cols[0].text(strip=True).strip(".")
                      if rank_text != "1":
                          continue
                      rider_name = ""
                      team_name = ""
                      for col in cols:
                          a = col.css_first("a[href*='/rider/']")
                          if a:
                              rider_name = a.text(strip=True)
                              break
                      for col in cols:
                          a = col.css_first("a[href*='/team/']")
                          if a:
                              team_name = a.text(strip=True)
                              break
                      if not rider_name:
                          # Some PCS pages put name directly in td
                          for col in cols[2:5]:
                              txt = col.text(strip=True)
                              if txt and len(txt) > 4 and not txt.replace(":", "").replace(".", "").isdigit():
                                  rider_name = txt
                                  break
                      if rider_name:
                          for key, (canonical, team) in KNOWN_WINNERS.items():
                              if key.lower() in rider_name.lower():
                                  print(f"    Winner: {canonical} ({team})")
                                  return canonical, team
                          print(f"    Winner: {rider_name} ({team_name or '?'})")
                          return rider_name, team_name
                  print(f"    No rank-1 row found for {race_name}")
                  return None, None
              except Exception as e:
                  print(f"    Error fetching {race_name}: {e}")
                  return None, None

          # ── RACE CALENDAR ──
          races = [
            # ── CLASSICS ──
            {"name":"Santos Tour Down Under","emoji":"🇦🇺","category":"2.UWT","date":"2026-01-20","end_date":"2026-01-25","stages":5,"status":"final","winner":"Jay Vine","team":"UAE Team Emirates XRG","notes":""},
            {"name":"Omloop Het Nieuwsblad","emoji":"🇧🇪","category":"1.UWT","date":"2026-02-28","status":"final","winner":"Mathieu van der Poel","team":"Alpecin-Premier Tech","notes":""},
            {"name":"Strade Bianche","emoji":"🇮🇹","category":"1.UWT","date":"2026-03-07","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"Solo on the white roads"},
            {"name":"Paris-Nice","emoji":"🇫🇷","category":"2.UWT","date":"2026-03-08","end_date":"2026-03-15","stages":8,"status":"final","winner":"Jonas Vingegaard","team":"Visma-Lease a Bike","notes":""},
            {"name":"Tirreno-Adriatico","emoji":"🇮🇹","category":"2.UWT","date":"2026-03-09","end_date":"2026-03-15","stages":7,"status":"final","winner":"Isaac Del Toro","team":"UAE Team Emirates XRG","notes":""},
            {"name":"Milan–San Remo","emoji":"🇮🇹","category":"Monument","date":"2026-03-21","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"Monument #1 of 2026"},
            {"name":"Volta a Catalunya","emoji":"🇪🇸","category":"2.UWT","date":"2026-03-23","end_date":"2026-03-29","stages":7,"status":"final","winner":"Jonas Vingegaard","team":"Visma-Lease a Bike","notes":""},
            {"name":"E3 Saxo Classic","emoji":"🇧🇪","category":"1.UWT","date":"2026-03-27","status":"final","winner":"Mathieu van der Poel","team":"Alpecin-Premier Tech","notes":""},
            {"name":"In Flanders Fields","emoji":"🇧🇪","category":"1.UWT","date":"2026-03-29","status":"final","winner":"Jasper Philipsen","team":"Alpecin-Premier Tech","notes":""},
            {"name":"Dwars door Vlaanderen","emoji":"🇧🇪","category":"1.UWT","date":"2026-04-01","status":"final","winner":"Filippo Ganna","team":"INEOS Grenadiers","notes":""},
            {"name":"Ronde van Vlaanderen","emoji":"🇧🇪","category":"Monument","date":"2026-04-05","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"3rd Flanders title"},
            {"name":"Itzulia Basque Country","emoji":"🇪🇸","category":"2.UWT","date":"2026-04-06","end_date":"2026-04-11","stages":6,"status":"final","winner":"Paul Seixas","team":"Decathlon CMA CGM","notes":""},
            {"name":"Paris–Roubaix","emoji":"🇫🇷","category":"Monument","date":"2026-04-12","status":"final","winner":"Wout van Aert","team":"Visma-Lease a Bike","notes":"48.91 km/h — fastest ever"},
            {"name":"Amstel Gold Race","emoji":"🇳🇱","category":"1.UWT","date":"2026-04-19","status":"final","winner":"Remco Evenepoel","team":"Red Bull - BORA - hansgrohe","notes":"Ardennes opener"},
            {"name":"La Flèche Wallonne","emoji":"🇧🇪","category":"1.UWT","date":"2026-04-22","status":"final","winner":"Paul Seixas","team":"Decathlon CMA CGM","notes":"19yo — youngest ever winner on Mur de Huy"},
            {"name":"Liège–Bastogne–Liège","emoji":"🇧🇪","category":"Monument","date":"2026-04-26","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"4th title · 3rd Monument 2026 · Seixas 2nd, Evenepoel 3rd"},
            {"name":"Tour de Romandie","emoji":"🇨🇭","category":"2.UWT","date":"2026-04-28","end_date":"2026-05-03","stages":6,"status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"4 stage wins · GC by 42s over Lipowitz · Martinez 3rd"},
            {"name":"Eschborn-Frankfurt","emoji":"🇩🇪","category":"1.UWT","date":"2026-05-01","status":"final","winner":"Georg Zimmermann","team":"Lotto Intermárché","notes":"Pidcock 2nd, Tulett 3rd · Biggest win of Zimmermann's career"},
            {"name":"Giro d'Italia","emoji":"🇮🇹","category":"Grand Tour","date":"2026-05-09","end_date":"2026-06-01","stages":21,"status":"upcoming","winner":None,"team":None,"notes":"May 9–Jun 1 · Bulgaria → Rome"},
            {"name":"Tour de Suisse","emoji":"🇨🇭","category":"2.UWT","date":"2026-06-17","end_date":"2026-06-25","stages":8,"status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Tour de France","emoji":"🇫🇷","category":"Grand Tour","date":"2026-07-04","end_date":"2026-07-26","stages":21,"status":"upcoming","winner":None,"team":None,"notes":"Jul 4–26"},
            {"name":"ADAC Cyclassics","emoji":"🇩🇪","category":"1.UWT","date":"2026-08-16","status":"upcoming","winner":None,"team":None,"notes":"Hamburg"},
            {"name":"Vuelta a España","emoji":"🇪🇸","category":"Grand Tour","date":"2026-08-22","end_date":"2026-09-13","stages":21,"status":"upcoming","winner":None,"team":None,"notes":"Aug 22–Sep 13"},
            {"name":"GP Québec","emoji":"🇨🇦","category":"1.UWT","date":"2026-09-11","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"GP Montréal","emoji":"🇨🇦","category":"1.UWT","date":"2026-09-13","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Il Lombardia","emoji":"🇮🇹","category":"Monument","date":"2026-10-10","status":"upcoming","winner":None,"team":None,"notes":"Race of the Falling Leaves"},
          ]

          today = date.today()
          for r in races:
              race_date = date.fromisoformat(r["date"])
              end_date = date.fromisoformat(r["end_date"]) if r.get("end_date") else race_date
              delta = (race_date - today).days
              r["days_away"] = delta if delta >= 0 else None
              # Mark as live if race is currently in progress
              if r["status"] == "upcoming" and race_date <= today <= end_date:
                  r["status"] = "live"
                  print(f"  Live: {r['name']}")

          # ── AUTO-UPDATE RACE RESULTS ──
          # For any race past its date still showing upcoming, try PCS
          for r in races:
              if r["status"] != "upcoming":
                  continue
              race_date = date.fromisoformat(r["date"])
              if (today - race_date).days < 1:
                  continue
              print(f"  Auto-fetching result for {r['name']} ({r['date']})...")
              winner, team = fetch_race_result(r["name"], r["date"])
              if winner:
                  r["status"] = "final"
                  r["winner"] = winner
                  r["team"] = team
                  print(f"  ✓ {r['name']}: {winner}")
              else:
                  print(f"  ✗ Could not auto-fetch {r['name']} — leaving as upcoming")

          # ── FETCH RIDER STATS ──
          riders = []
          watch_list = [
              ("tadej-pogacar", "Tadej Pogačar", "🇸🇮"),
              ("mathieu-van-der-poel", "Mathieu van der Poel", "🇳🇱"),
              ("remco-evenepoel", "Remco Evenepoel", "🇧🇪"),
          ]

          for slug, name, flag in watch_list:
              stats = get_rider_stats(slug, name, flag)
              riders.append(stats)
              if stats.get("fetched"):
                  print(f"  {name}: {stats.get('wins_2026', 0)} wins in 2026, PCS rank #{stats.get('pcs_ranking', '?')}")

          # ── FETCH GC DATA FOR LIVE RACES ──
          for r in races:
              if r["status"] != "live":
                  continue
              slug = PCS_RACE_SLUGS.get(r["name"])
              if not slug:
                  continue
              print(f"  Fetching live GC for {r['name']}...")
              live_data = fetch_live_race(r["name"], slug)
              if live_data:
                  r["live_gc"] = live_data.get("gc", [])
                  r["stages_done"] = live_data.get("stages_done", 0)
                  if live_data.get("leader"):
                      leader = live_data["leader"]
                      r["gc_leader"] = leader.get("name", "")
                      r["gc_leader_team"] = leader.get("team", "")
                  print(f"    GC: {r.get('gc_leader','?')} leads, {r.get('stages_done','?')} stages done")

          # Cross-reference rider wins against calendar
          import unicodedata
          def norm(s):
              # Replace dashes/en-dashes BEFORE stripping accents
              s = s.replace("\u2013", " ").replace("\u2014", " ").replace("-", " ")
              s = unicodedata.normalize("NFKD", s)
              s = s.encode("ascii", "ignore").decode("ascii")
              return s.lower().strip()

          for rider in riders:
              if not rider.get("fetched"):
                  continue
              for win in rider.get("win_list", []):
                  win_raw = win.get("race", "")
                  if not win_raw:
                      continue
                  win_norm = norm(win_raw)
                  for r in races:
                      if r["status"] != "upcoming":
                          continue
                      cal_norm = norm(r["name"])
                      w_words = set(w for w in win_norm.split() if len(w) > 3)
                      c_words = set(w for w in cal_norm.split() if len(w) > 3)
                      if w_words and c_words and len(w_words & c_words) >= 1:
                          r["status"] = "final"
                          r["winner"] = rider["name"]
                          r["team"] = rider.get("team", "")
                          print(f"  Cross-ref HIT: {r['name']} -> {rider['name']}")
                          break

          # Keep cached rider profiles if scraping failed
          merged_riders = riders
          if not any(r.get("fetched") for r in riders):
              print("No rider data -- keeping cached")
              try:
                  with open("cycling.json", encoding="utf-8") as ef:
                      cached = json.load(ef)
                      merged_riders = cached.get("riders", riders)
              except Exception:
                  pass

          output = {
              "races": races,
              "riders": merged_riders,
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "season": "2026",
              "watch": "Tadej Pogačar — chasing all 5 Monuments"
          }

          with open("cycling.json", "w") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          finals = [r for r in races if r["status"] == "final"]
          upcoming = [r for r in races if r["status"] == "upcoming"]
          fetched_riders = [r for r in merged_riders if r.get("fetched")]
          print(f"cycling.json written: {len(finals)} results, {len(upcoming)} upcoming, {len(fetched_riders)}/{len(merged_riders)} rider profiles")
          EOF


      - name: Fetch grand tour stage results
        continue-on-error: true
        run: |
          python3 << 'GTEOF'
          import json, os, re
          from datetime import date, timedelta
          import cloudscraper
          from selectolax.parser import HTMLParser

          DATA_DIR = "data"
          GRAND_TOURS = [
              {"name": "Giro d'Italia",  "slug": "giro-d-italia",  "file": "giro-2026.json",  "start": "2026-05-09", "end": "2026-06-01"},
              {"name": "Tour de France", "slug": "tour-de-france", "file": "tdf-2026.json",   "start": "2026-07-04", "end": "2026-07-26"},
              {"name": "Vuelta",         "slug": "vuelta-a-espana","file": "vuelta-2026.json", "start": "2026-08-22", "end": "2026-09-13"},
          ]
          today = date.today()
          scraper = cloudscraper.create_scraper()
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          KNOWN = {
              "pogacar": ("Tadej Pogacar", "UAE Team Emirates XRG"),
              "vingegaard": ("Jonas Vingegaard", "Visma-Lease a Bike"),
              "evenepoel": ("Remco Evenepoel", "Red Bull - BORA - hansgrohe"),
              "roglic": ("Primoz Roglic", "Red Bull - BORA - hansgrohe"),
              "van der poel": ("Mathieu van der Poel", "Alpecin-Premier Tech"),
              "seixas": ("Paul Seixas", "Decathlon CMA CGM"),
          }
          def canonical(name, team):
              for key, (cn, ct) in KNOWN.items():
                  if key.lower() in name.lower():
                      return cn, ct
              return name, team

          def get_rank1(table):
              if not table:
                  return None, None
              for row in table.css("tr"):
                  cols = row.css("td")
                  if not cols:
                      continue
                  rank = cols[0].text(strip=True).strip(".")
                  el = cols[0].css_first("span,b,div")
                  if not rank.isdigit() and el:
                      rank = el.text(strip=True).strip(".")
                  if rank != "1":
                      continue
                  name = team = ""
                  for col in cols:
                      a = col.css_first("a[href*='/rider/']")
                      if a and not name:
                          name = a.text(strip=True)
                      a2 = col.css_first("a[href*='/team/']")
                      if a2 and not team:
                          team = a2.text(strip=True)
                  if name:
                      return canonical(name, team)
              return None, None

          def first_table(tree):
              for sel in ["table.rdrResults", "table.results", "table"]:
                  t = tree.css_first(sel)
                  if t:
                      return t
              return None

          def scrape_stage(slug, num):
              try:
                  r = scraper.get(f"https://www.procyclingstats.com/race/{slug}/2026/stage-{num}", headers=headers, timeout=15)
                  if r.status_code != 200:
                      return None, None
                  return get_rank1(first_table(HTMLParser(r.text)))
              except Exception as e:
                  print(f"    S{num} error: {e}")
                  return None, None

          def scrape_gc(slug):
              for url in [
                  f"https://www.procyclingstats.com/race/{slug}/2026/gc",
                  f"https://www.procyclingstats.com/race/{slug}/2026/general-classification",
              ]:
                  try:
                      r = scraper.get(url, headers=headers, timeout=15)
                      if r.status_code != 200:
                          continue
                      gc = []
                      table = first_table(HTMLParser(r.text))
                      if not table:
                          continue
                      for row in table.css("tr"):
                          cols = row.css("td")
                          if not cols:
                              continue
                          rank = cols[0].text(strip=True).strip(".")
                          el = cols[0].css_first("span,b,div")
                          if not rank.isdigit() and el:
                              rank = el.text(strip=True).strip(".")
                          if not rank.isdigit():
                              continue
                          if int(rank) > 10:
                              break
                          name = team = gap = ""
                          for col in cols:
                              a = col.css_first("a[href*='/rider/']")
                              if a and not name:
                                  name = a.text(strip=True)
                              a2 = col.css_first("a[href*='/team/']")
                              if a2 and not team:
                                  team = a2.text(strip=True)
                          for col in reversed(cols):
                              t = col.text(strip=True)
                              if re.match(r"^\d+:\d+|^\+\d|^s\.t\.$|^0:00$", t):
                                  gap = t
                                  break
                          if name:
                              cn, ct = canonical(name, team)
                              gc.append({"name": cn, "team": ct, "gap": "Leader" if not gc else gap})
                      if gc:
                          return gc
                  except Exception as e:
                      print(f"    GC error: {e}")
              return []

          for gt in GRAND_TOURS:
              start = date.fromisoformat(gt["start"])
              end = date.fromisoformat(gt["end"])
              if today < start:
                  print(f"Skipping {gt['name']} (starts {gt['start']})")
                  continue
              fpath = os.path.join(DATA_DIR, gt["file"])
              if not os.path.exists(fpath):
                  print(f"No data file: {fpath}")
                  continue
              with open(fpath, encoding="utf-8") as f:
                  data = json.load(f)
              print(f"\nUpdating {gt['name']}...")
              updated = False
              for stage in data["stages"]:
                  if date.fromisoformat(stage["date"]) > today:
                      break
                  if stage.get("winner"):
                      continue
                  print(f"  Scraping S{stage['num']}...")
                  winner, team = scrape_stage(gt["slug"], stage["num"])
                  if winner:
                      stage["winner"] = winner
                      stage["winner_team"] = team
                      print(f"  S{stage['num']}: {winner}")
                      updated = True
              if start <= today <= end + timedelta(days=1):
                  gc = scrape_gc(gt["slug"])
                  if gc:
                      data["gc"] = gc
                      print(f"  GC: {gc[0]['name']} leads")
                      updated = True
                  # Scrape jersey leaders
                  for jersey, path, key in [
                      ("Points", "points", "points_leader"),
                      ("KOM",    "kom",    "kom_leader"),
                      ("Youth",  "youth",  "young_rider"),
                  ]:
                      try:
                          r = scraper.get(f"https://www.procyclingstats.com/race/{gt['slug']}/2026/{path}", headers=headers, timeout=10)
                          if r.status_code == 200:
                              tree = HTMLParser(r.text)
                              table = first_table(tree)
                              name, _ = get_rank1(table)
                              if name:
                                  data[key] = name
                                  print(f"  {jersey} jersey: {name}")
                                  updated = True
                      except Exception as e:
                          print(f"  {jersey} jersey error: {e}")
              if updated:
                  if data.get("stages") and len(data["stages"]) > 0:
                      with open(fpath, "w", encoding="utf-8") as f:
                          json.dump(data, f, indent=2, ensure_ascii=False)
                      print(f"  Saved {gt['file']}")
                  else:
                      print("  Skipping save -- no stages")
          print("Grand tour update done.")
          GTEOF

