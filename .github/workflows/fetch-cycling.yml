name: Fetch Cycling

on:
  schedule:
    - cron: '0 20 * * *'   # 8pm UTC daily — catches afternoon European race finishes
  workflow_dispatch:

jobs:
  fetch-cycling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install procyclingstats cloudscraper requests --break-system-packages

      - name: Fetch cycling data and write cycling.json
        run: |
          python3 << 'EOF'
          import json
          import traceback
          from datetime import datetime, timezone, date

          # ── RIDER SPOTLIGHT ──
          # Pull live stats for watched riders from PCS
          def get_rider_stats(pcs_slug, display_name, nationality_flag):
              try:
                  from procyclingstats import Rider, RiderResults
                  print(f"  Fetching rider: {display_name}...")

                  rider = Rider(f"rider/{pcs_slug}")
                  data = rider.parse()

                  # Try multiple URL formats for results
                  results = []
                  for url in [
                      f"rider/{pcs_slug}/results/2026/all",
                      f"rider/{pcs_slug}/results/2026",
                      f"rider/{pcs_slug}/statistics/wins",
                  ]:
                      try:
                          results_scraper = RiderResults(url)
                          results_data = results_scraper.parse()
                          results = results_data.get("results", []) or []
                          if results:
                              print(f"    Got {len(results)} results via {url}")
                              break
                      except Exception as e2:
                          print(f"    URL {url} failed: {e2}")
                          continue

                  wins_2026 = [r for r in results if str(r.get("result", "")).strip() == "1"]
                  recent = results[:5]

                  return {
                      "name": display_name,
                      "flag": nationality_flag,
                      "team": data.get("team", ""),
                      "nationality": data.get("nationality", ""),
                      "pcs_ranking": data.get("ranking", None),
                      "wins_2026": len(wins_2026),
                      "win_list": [
                          {"race": w.get("race", ""), "date": w.get("date", ""), "category": w.get("class", "")}
                          for w in wins_2026[:8]
                      ],
                      "recent_results": [
                          {"race": r.get("race", ""), "result": r.get("result", ""), "date": r.get("date", "")}
                          for r in recent
                      ],
                      "fetched": True
                  }
              except Exception as e:
                  print(f"  ERROR fetching {display_name}: {e}")
                  traceback.print_exc()
                  return {
                      "name": display_name,
                      "flag": nationality_flag,
                      "fetched": False,
                      "error": str(e)
                  }

          # ── RACE CALENDAR ──
          races = [
            # SPRING CLASSICS 2026
            {
              "name": "Omloop Het Nieuwsblad",
              "emoji": "🇧🇪",
              "category": "1.UWT",
              "date": "2026-03-01",
              "status": "final",
              "winner": "Mathieu van der Poel",
              "team": "Alpecin-Premier Tech",
              "notes": "Van der Poel opens the classics season"
            },
            {
              "name": "Strade Bianche",
              "emoji": "🇮🇹",
              "category": "Monument",
              "date": "2026-03-07",
              "status": "final",
              "winner": "Tadej Pogačar 🌈",
              "team": "UAE Team Emirates XRG",
              "notes": "79km solo — Pogačar dominates on the white roads"
            },
            {
              "name": "Milan–San Remo",
              "emoji": "🇮🇹",
              "category": "Monument",
              "date": "2026-03-21",
              "status": "final",
              "winner": "Tadej Pogačar 🌈",
              "team": "UAE Team Emirates XRG",
              "notes": "Spectacular chase — beats Pidcock in sprint. Monument #1."
            },
            {
              "name": "E3 Saxo Classic",
              "emoji": "🇧🇪",
              "category": "1.UWT",
              "date": "2026-03-27",
              "status": "final",
              "winner": "Mathieu van der Poel",
              "team": "Alpecin-Premier Tech",
              "notes": "Mini Tour of Flanders"
            },
            {
              "name": "In Flanders Fields",
              "emoji": "🇧🇪",
              "category": "1.UWT",
              "date": "2026-03-29",
              "status": "final",
              "winner": "Jasper Philipsen",
              "team": "Alpecin-Premier Tech",
              "notes": "Formerly Gent-Wevelgem"
            },
            {
              "name": "Dwars door Vlaanderen",
              "emoji": "🇧🇪",
              "category": "1.UWT",
              "date": "2026-04-01",
              "status": "final",
              "winner": None,
              "team": None,
              "notes": "Semi-classic ahead of RVV — update after race"
            },
            {
              "name": "Ronde van Vlaanderen",
              "emoji": "🇧🇪",
              "category": "Monument",
              "date": "2026-04-05",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Tour of Flanders · Pogačar vs MvdP · The big one"
            },
            {
              "name": "Paris–Roubaix",
              "emoji": "🇫🇷",
              "category": "Monument",
              "date": "2026-04-12",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Hell of the North · 50km of cobbles"
            },
            {
              "name": "Amstel Gold Race",
              "emoji": "🇳🇱",
              "category": "1.UWT",
              "date": "2026-04-19",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Ardennes opener"
            },
            {
              "name": "La Flèche Wallonne",
              "emoji": "🇧🇪",
              "category": "1.UWT",
              "date": "2026-04-22",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Mur de Huy wall finish"
            },
            {
              "name": "Liège–Bastogne–Liège",
              "emoji": "🇧🇪",
              "category": "Monument",
              "date": "2026-04-26",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "La Doyenne · Pogačar won in 2025"
            },
            # GRAND TOURS
            {
              "name": "Giro d'Italia",
              "emoji": "🇮🇹",
              "category": "Grand Tour",
              "date": "2026-05-09",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "May 9 – Jun 1"
            },
            {
              "name": "Tour de France",
              "emoji": "🇫🇷",
              "category": "Grand Tour",
              "date": "2026-07-04",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Grand Départ Copenhagen · Jul 4–26"
            },
            {
              "name": "Vuelta a España",
              "emoji": "🇪🇸",
              "category": "Grand Tour",
              "date": "2026-08-15",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Aug 15 – Sep 6"
            },
            # FALL MONUMENTS
            {
              "name": "Il Lombardia",
              "emoji": "🇮🇹",
              "category": "Monument",
              "date": "2026-10-10",
              "status": "upcoming",
              "winner": None,
              "team": None,
              "notes": "Race of the Falling Leaves · final Monument"
            },
          ]

          # Compute days away
          today = date.today()
          for r in races:
              race_date = date.fromisoformat(r["date"])
              delta = (race_date - today).days
              r["days_away"] = delta if delta >= 0 else None

          # ── FETCH RIDER STATS ──
          riders = []
          watch_list = [
              ("tadej-pogacar", "Tadej Pogačar", "🇸🇮"),
              ("mathieu-van-der-poel", "Mathieu van der Poel", "🇳🇱"),
              ("remco-evenepoel", "Remco Evenepoel", "🇧🇪"),
          ]

          for slug, name, flag in watch_list:
              stats = get_rider_stats(slug, name, flag)
              riders.append(stats)
              if stats.get("fetched"):
                  print(f"  {name}: {stats.get('wins_2026', 0)} wins in 2026, PCS rank #{stats.get('pcs_ranking', '?')}")

          # ── WRITE OUTPUT ──
          output = {
              "races": races,
              "riders": riders,
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "season": "2026",
              "watch": "Tadej Pogačar — chasing all 5 Monuments"
          }

          with open("cycling.json", "w") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          finals = [r for r in races if r["status"] == "final"]
          upcoming = [r for r in races if r["status"] == "upcoming"]
          fetched_riders = [r for r in riders if r.get("fetched")]
          print(f"cycling.json written: {len(finals)} results, {len(upcoming)} upcoming, {len(fetched_riders)}/{len(riders)} rider profiles")
          EOF

      - name: Commit cycling.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cycling.json
          git diff --staged --quiet || git commit -m "chore: update cycling.json [skip ci]"
          git push
