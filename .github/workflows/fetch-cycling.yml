name: Fetch Cycling

on:
  schedule:
    - cron: '0 20 * * *'   # 8pm UTC daily — catches afternoon European race finishes
  workflow_dispatch:

jobs:
  fetch-cycling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install cloudscraper selectolax requests --break-system-packages

      - name: Fetch cycling data and write cycling.json
        run: |
          python3 << 'EOF'
          import json
          import traceback
          from datetime import datetime, timezone, date

          # ── RIDER SPOTLIGHT ──
          def get_rider_stats(pcs_slug, display_name, nationality_flag):
              try:
                  import cloudscraper
                  from selectolax.parser import HTMLParser
                  import re
                  print(f"  Fetching rider: {display_name}...")

                  scraper = cloudscraper.create_scraper()
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

                  results_url = f"https://www.procyclingstats.com/rider/{pcs_slug}/results/2026"
                  r2 = scraper.get(results_url, headers=headers, timeout=15)
                  tree2 = HTMLParser(r2.text)

                  results = []
                  table = tree2.css_first("table.rdrResults")
                  if table:
                      rows = table.css("tr")
                      print(f"    rdrResults rows: {len(rows)}")
                      for row in rows:
                          cols = row.css("td")
                          if len(cols) >= 3:
                              date_val = cols[0].text(strip=True)
                              result_val = cols[1].text(strip=True)
                              race_val = ""
                              for col in cols[2:]:
                                  a = col.css_first("a")
                                  if a:
                                      race_val = a.text(strip=True)
                                      race_val = re.sub(r'\s*\(.*?\)\s*', '', race_val).strip()
                                      break
                              if not race_val:
                                  race_val = cols[2].text(strip=True)
                                  race_val = re.sub(r'\s*\(.*?\)\s*', '', race_val).strip()
                              if race_val and len(race_val) > 2:
                                  results.append({"date": date_val, "result": result_val, "race": race_val})
                  else:
                      print(f"    No rdrResults table found")

                  wins_2026 = [r for r in results if str(r.get("result","")).strip() == "1"]

                  def clean_race_name(name):
                      import re
                      name = re.sub(r'^S\d+Stage \d+[-–]\s*', '', name)
                      name = re.sub(r'^General classification\s*', 'GC ', name)
                      name = re.sub(r'\s*ME$', '', name)
                      return name.strip()

                  for r in results:
                      r["race"] = clean_race_name(r["race"])
                  for w in wins_2026:
                      w["race"] = clean_race_name(w["race"])

                  print(f"    {len(results)} results, {len(wins_2026)} wins")
                  if wins_2026:
                      print(f"    Wins: {[w['race'] for w in wins_2026]}")

                  team = ""
                  pcs_ranking = None
                  pcs_points = None
                  try:
                      profile_url = f"https://www.procyclingstats.com/rider/{pcs_slug}"
                      rp = scraper.get(profile_url, headers=headers, timeout=15)
                      tp = HTMLParser(rp.text)

                      teams_ul = tp.css_first("ul[class*='rdr-teams']")
                      if teams_ul:
                          for a in teams_ul.css("a"):
                              txt = a.text(strip=True)
                              if txt and "(WT)" not in txt and len(txt) > 3:
                                  team = txt
                                  break
                          if not team:
                              full = teams_ul.text(strip=True)
                              m = re.search(r'\d{4}(.*?)\(WT\)', full)
                              if m:
                                  team = m.group(1).strip()

                      for ul in tp.css("ul.list.horizontal, ul[class='list horizontal']"):
                          txt = ul.text(strip=True)
                          m = re.search(r'PCS Ranking(\d+)', txt)
                          if m:
                              pcs_ranking = m.group(1)
                              break

                      basic = tp.css_first("table[class*='basic small'], table[class=' basic small']")
                      if basic:
                          for row in basic.css("tr"):
                              cols = row.css("td")
                              col_texts = [c.text(strip=True) for c in cols]
                              if col_texts and col_texts[0] == "2026":
                                  pcs_points = col_texts[1] if len(col_texts) > 1 else None
                                  break

                      print(f"    Team: {team or '?'}, Rank: #{pcs_ranking or '?'}, Pts: {pcs_points or '?'}")
                  except Exception as ep:
                      print(f"    Profile error: {ep}")

                  return {
                      "name": display_name,
                      "flag": nationality_flag,
                      "team": team,
                      "pcs_ranking": pcs_ranking,
                      "pcs_points": pcs_points,
                      "wins_2026": len(wins_2026),
                      "win_list": [{"race": w.get("race",""), "date": w.get("date","")} for w in wins_2026[:8]],
                      "recent_results": results[:6],
                      "fetched": True
                  }
              except Exception as e:
                  print(f"  ERROR fetching {display_name}: {e}")
                  traceback.print_exc()
                  return {"name": display_name, "flag": nationality_flag, "fetched": False, "error": str(e)}

          # ── RACE CALENDAR ──
          races = [
            {"name":"Santos Tour Down Under","emoji":"🇦🇺","category":"2.UWT","date":"2026-01-20","status":"final","winner":"Jay Vine","team":"UAE Team Emirates XRG","notes":""},
            {"name":"Omloop Het Nieuwsblad","emoji":"🇧🇪","category":"1.UWT","date":"2026-02-28","status":"final","winner":"Mathieu van der Poel","team":"Alpecin-Premier Tech","notes":""},
            {"name":"Strade Bianche","emoji":"🇮🇹","category":"1.UWT","date":"2026-03-07","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"Solo on the white roads"},
            {"name":"Paris-Nice","emoji":"🇫🇷","category":"2.UWT","date":"2026-03-08","status":"final","winner":"Jonas Vingegaard","team":"Visma-Lease a Bike","notes":""},
            {"name":"Tirreno-Adriatico","emoji":"🇮🇹","category":"2.UWT","date":"2026-03-09","status":"final","winner":"Isaac Del Toro","team":"UAE Team Emirates XRG","notes":""},
            {"name":"Milan–San Remo","emoji":"🇮🇹","category":"Monument","date":"2026-03-21","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"Monument #1 of 2026"},
            {"name":"Volta a Catalunya","emoji":"🇪🇸","category":"2.UWT","date":"2026-03-23","status":"final","winner":"Jonas Vingegaard","team":"Visma-Lease a Bike","notes":""},
            {"name":"E3 Saxo Classic","emoji":"🇧🇪","category":"1.UWT","date":"2026-03-27","status":"final","winner":"Mathieu van der Poel","team":"Alpecin-Premier Tech","notes":""},
            {"name":"In Flanders Fields","emoji":"🇧🇪","category":"1.UWT","date":"2026-03-29","status":"final","winner":"Jasper Philipsen","team":"Alpecin-Premier Tech","notes":""},
            {"name":"Dwars door Vlaanderen","emoji":"🇧🇪","category":"1.UWT","date":"2026-04-01","status":"final","winner":"Filippo Ganna","team":"INEOS Grenadiers","notes":""},
            {"name":"Ronde van Vlaanderen","emoji":"🇧🇪","category":"Monument","date":"2026-04-05","status":"final","winner":"Tadej Pogačar 🌈","team":"UAE Team Emirates XRG","notes":"3rd Flanders title"},
            {"name":"Itzulia Basque Country","emoji":"🇪🇸","category":"2.UWT","date":"2026-04-06","status":"final","winner":"Paul Seixas","team":"","notes":""},
            {"name":"Paris–Roubaix","emoji":"🇫🇷","category":"Monument","date":"2026-04-12","status":"final","winner":"Wout van Aert","team":"Visma-Lease a Bike","notes":"48.91 km/h — fastest ever"},
            {"name":"Amstel Gold Race","emoji":"🇳🇱","category":"1.UWT","date":"2026-04-19","status":"final","winner":"Remco Evenepoel","team":"Soudal-Quick Step","notes":"Ardennes opener"},
            {"name":"La Flèche Wallonne","emoji":"🇧🇪","category":"1.UWT","date":"2026-04-22","status":"upcoming","winner":None,"team":None,"notes":"Mur de Huy wall finish"},
            {"name":"Liège–Bastogne–Liège","emoji":"🇧🇪","category":"Monument","date":"2026-04-26","status":"upcoming","winner":None,"team":None,"notes":"La Doyenne"},
            {"name":"Tour de Romandie","emoji":"🇨🇭","category":"2.UWT","date":"2026-04-28","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Eschborn-Frankfurt","emoji":"🇩🇪","category":"1.UWT","date":"2026-05-01","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Giro d'Italia","emoji":"🇮🇹","category":"Grand Tour","date":"2026-05-08","status":"upcoming","winner":None,"team":None,"notes":"May 8–31"},
            {"name":"Tour de Suisse","emoji":"🇨🇭","category":"2.UWT","date":"2026-06-17","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Tour de France","emoji":"🇫🇷","category":"Grand Tour","date":"2026-07-04","status":"upcoming","winner":None,"team":None,"notes":"Jul 4–26"},
            {"name":"ADAC Cyclassics","emoji":"🇩🇪","category":"1.UWT","date":"2026-08-16","status":"upcoming","winner":None,"team":None,"notes":"Hamburg"},
            {"name":"Vuelta a España","emoji":"🇪🇸","category":"Grand Tour","date":"2026-08-22","status":"upcoming","winner":None,"team":None,"notes":"Aug 22–Sep 13"},
            {"name":"GP Québec","emoji":"🇨🇦","category":"1.UWT","date":"2026-09-11","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"GP Montréal","emoji":"🇨🇦","category":"1.UWT","date":"2026-09-13","status":"upcoming","winner":None,"team":None,"notes":""},
            {"name":"Il Lombardia","emoji":"🇮🇹","category":"Monument","date":"2026-10-10","status":"upcoming","winner":None,"team":None,"notes":"Race of the Falling Leaves"},
          ]

          today = date.today()
          for r in races:
              race_date = date.fromisoformat(r["date"])
              delta = (race_date - today).days
              r["days_away"] = delta if delta >= 0 else None

          # ── FETCH RIDER STATS ──
          riders = []
          watch_list = [
              ("tadej-pogacar", "Tadej Pogačar", "🇸🇮"),
              ("mathieu-van-der-poel", "Mathieu van der Poel", "🇳🇱"),
              ("remco-evenepoel", "Remco Evenepoel", "🇧🇪"),
          ]

          for slug, name, flag in watch_list:
              stats = get_rider_stats(slug, name, flag)
              riders.append(stats)
              if stats.get("fetched"):
                  print(f"  {name}: {stats.get('wins_2026', 0)} wins in 2026, PCS rank #{stats.get('pcs_ranking', '?')}")

          output = {
              "races": races,
              "riders": riders,
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "season": "2026",
              "watch": "Tadej Pogačar — chasing all 5 Monuments"
          }

          with open("cycling.json", "w") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          finals = [r for r in races if r["status"] == "final"]
          upcoming = [r for r in races if r["status"] == "upcoming"]
          fetched_riders = [r for r in riders if r.get("fetched")]
          print(f"cycling.json written: {len(finals)} results, {len(upcoming)} upcoming, {len(fetched_riders)}/{len(riders)} rider profiles")
          EOF

      - name: Commit cycling.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cycling.json
          git diff --staged --quiet || git commit -m "chore: update cycling.json [skip ci]"
          git push
